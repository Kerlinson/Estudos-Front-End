<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplos Práticos de Flexbox</title>
    <style>
        /* =========================================
           Estilos básicos para a página (apenas visual)
           ========================================= */
        body {
            font-family: sans-serif;
            background-color: #2b2b2b;
            color: #ffffff;
            padding: 20px;
        }
        h2 {
            color: #4CAF50;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }

        /* =========================================
           Estilo dos "Filhos" (Flex Items)
           ========================================= */
        .box {
            background-color: #2196F3;
            color: white;
            padding: 20px;
            margin: 5px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            text-align: center;
        }

        /* =========================================
           Estilo do "Pai" (Flex Container Base)
           ========================================= */
        .container {
            background-color: #444;
            padding: 10px;
            margin-bottom: 40px;
            border-radius: 8px;
            
            /* A mágica acontece aqui! Isso transforma o contêiner em Flexbox */
            display: flex; 
        }

        /* =========================================
           1. Modificando a Direção (Flex-Direction)
           ========================================= */
        /* Muda a direção dos itens de linha (padrão) para coluna */
        .dir-column {
            flex-direction: column; 
        }

        /* =========================================
           2. Alinhamento no Eixo Principal (Justify-Content)
           ========================================= */
        /* Espalha os itens, deixando um espaço igual entre eles */
        .jc-space-between {
            justify-content: space-between; 
        }
        
        /* Centraliza os itens horizontalmente (no eixo principal) */
        .jc-center {
            justify-content: center; 
        }

        /* =========================================
           3. Alinhamento no Eixo Transversal (Align-Items)
           ========================================= */
        .ai-center {
            /* Adicionei uma altura fixa para que o eixo transversal (vertical) fique visível */
            height: 150px; 
            
            /* Centraliza os itens verticalmente (no eixo transversal) */
            align-items: center; 
        }

        /* =========================================
           4. Quebra de Linha (Flex-Wrap)
           ========================================= */
        .wrap {
            /* Se os itens não couberem na mesma linha, eles "caem" para a linha de baixo */
            flex-wrap: wrap; 
        }
    </style>
</head>
<body>

    <h2>1. Flex-Direction: Column</h2>
    <div class="container dir-column">
        <div class="box">Item 1</div>
        <div class="box">Item 2</div>
        <div class="box">Item 3</div>
    </div>

    <h2>2. Justify-Content: Space-Between</h2>
    <div class="container jc-space-between">
        <div class="box">Item 1</div>
        <div class="box">Item 2</div>
        <div class="box">Item 3</div>
    </div>

    <h2>3. Align-Items: Center</h2>
    <div class="container ai-center">
        <div class="box">Item 1</div>
        <div class="box">Item 2</div>
        <div class="box">Item 3</div>
    </div>

    <h2>4. Flex-Wrap: Wrap (Redimensione a janela do navegador!)</h2>
    <div class="container wrap">
        <div class="box">Item 1</div>
        <div class="box">Item 2</div>
        <div class="box">Item 3</div>
        <div class="box">Item 4</div>
        <div class="box">Item 5</div>
        <div class="box">Item 6</div>
        <div class="box">Item 7</div>
        <div class="box">Item 8</div>
    </div>

</body>
</html>
