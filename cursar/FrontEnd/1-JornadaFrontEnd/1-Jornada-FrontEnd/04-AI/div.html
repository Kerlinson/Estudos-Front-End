<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Flexbox - Column Reverse</title>
    <style>
        /* Estilo da caixa que envolve tudo (O Container) */
        .container {
            /* Ativa o flexbox */
            display: flex; 
            
            /* Muda a direção para coluna e inverte a ordem (de baixo para cima) */
            flex-direction: column-reverse; 
            
            /* Como usamos column-reverse, o flex-start agora é a parte de BAIXO */
            justify-content: flex-start; 
            
            /* Mantém os itens colados no lado esquerdo */
            align-items: flex-start; 
            
            /* Dimensões e bordas parecidas com a da sua imagem para visualizar melhor */
            height: 400px; 
            width: 500px;
            border: 6px solid #ff0055; 
            background-color: #ffffff;
            margin: 20px;
        }

        /* Estilo dos blocos numéricos (Os Itens) */
        .box {
            background-color: #ff0055;
            color: #ffffff;
            width: 80px;
            padding: 5px 0;
            text-align: center;
            font-size: 20px;
            font-family: sans-serif;
            border-bottom: 1px solid white; /* Cria aquela linhazinha branca separando os números */
        }
        
        /* Remove a borda branca do último item (o número 5) para ficar igual à imagem */
        .box:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>

</body>
</html>
