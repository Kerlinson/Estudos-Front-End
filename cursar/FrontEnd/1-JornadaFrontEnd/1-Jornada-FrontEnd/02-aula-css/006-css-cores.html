<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Css cores</title>


    <style>

div{
  color: #ffffff;
  padding: 30px;
  text-align: center;
}

div:nth-child(1){
  background: #780000;
}

div:nth-child(2){
  background: #669BBC;
}

div:nth-child(3){
  background: #FDF0D5;
}

    </style>
  </head>
  <body>
    <div>#780000</div>

    <div>#669BBC</div>

    <div>#FDF0D5</div>
  </body>
</html>
