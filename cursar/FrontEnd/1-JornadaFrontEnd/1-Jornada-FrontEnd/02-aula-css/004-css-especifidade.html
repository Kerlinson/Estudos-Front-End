<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Css</title>
<!--0.0.0.1-->

<Style>
    p{
      color: red;
    }
    
/* 0.0.1.1''  (aqui ele soma)*/ 
    .nova-cor{
      color: chartreuse;
    }

    /* 0.1.0.1'' ID (aqui é unico) */
    #nova-cor-id-1,
     #nova-cor-id-2{
      color: darkblue;
    }



  </Style>
</head>
<body>
  <P>Texto 1</P>
  <P class="nova-cor">Texto 2</P>
  <P class="nova-cor">Texto 3</P>
  <P id="nova-cor-id-1" class="nova-cor">Texto 4</P>

  <!--/* 1.1.1.1 */
-->
  <P id="nova-cor-id-2" class="nova-cor" style="color: coral;">Texto 5</P>
  <p>texto 6</p>
</body>
</html>
