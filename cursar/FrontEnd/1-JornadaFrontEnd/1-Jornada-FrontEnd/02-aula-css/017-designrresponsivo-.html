<!doctype html>

<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Css responsivo</title>

    <style>
      /* corpo */

      body {
        background: red;

        color: white;

        font-size: 30px;
      }

      /* parágrafo */

      p {
        display: none;
      }

      /* não sei o nome */

      @media (max-width: 500px) {
        body {
          background: rgb(97, 255, 34);
        }
      }

      @media (min-width: 320px) {
        body {
          font-size: 50px;

          background: blue;
        }

        /* paragrafo */

        p {
          display: block;
        }
      }

      /* */
    </style>
  </head>

  <body>
    texto

    <p>texto 2</p>
  </body>
</html>
